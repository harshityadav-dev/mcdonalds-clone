<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mc Donald's: Burgers, Fries & More</title>
    <meta name="description" content="Craving the ultimate burger experience? Explore premium burgers, crispy fries, and a modern McDonald's inspired fast-food website with stunning visuals and creative design.">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">

</head>
<body>

        <!-- Navbar -->
    <nav>

        <!-- Left Logo -->
        <div class="logo">
            <img src="assets/logo1.png" alt="MacDonald's Logo">
        </div>

        <!-- Center Navigation -->
        <div class="nav-center">
            <a href="">Home</a>
            <a href="">Menu</a>
            <a href="">About</a>
            <a href="">Offers</a>
            <a href="">Contact</a>
        </div>

        <!-- Right Buttons -->
        <div 
            class="profile-icon">
            <img src="assets/user.png" alt="Profile">
        </div>

        <!-- Language Selector -->

    <div class="language-selector">

        <span class="language-text">
        Language
        </span>

        <span class="arrow">
        ˅
        </span>


        <div class="language-dropdown">

        <p class="active-language">
            ✓ English
        </p>

        <p>Hindi</p>

        <p>French</p>

        <p>Spanish</p>

        </div>

    </div>

    </nav>


    <section class="hero">

    <div class="hero-content">



        <!-- Left Side -->

        <div class="drink-image">

        <img src="assets/strawberry.png" alt="Drink">

        </div> 


        <!-- Right Side -->

        <div class="drink-info">

            <h1>
    Take A Sip
</h1>

<h2>
    from our new refreshing drinks
</h2>


<div class="try-section">

    <div class="try-title">

    <img src="assets/try.png" alt="Try Now">

    </div>

     <div class="flavors">

        <p class="red">
        Strawberry Watermelon Refresher
        </p>

        <p class="yellow">
        Mango Pineapple Refresher
        </p>

        <p class="blue">
        Sprite® Berry Blast
        </p>

    </div>

    <button class="sip-button">
    Start Sipping
    </button>
